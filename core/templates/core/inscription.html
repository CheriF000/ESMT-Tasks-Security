{% extends 'core/base.html' %}
{% block title %}Inscription{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="fas fa-user-plus me-2"></i>Inscription</h3>
           <form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-bold">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
            {% endfor %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
</form>
            <p class="text-center mt-3">Déjà un compte ? <a href="{% url 'connexion' %}">Se connecter</a></p>
        </div>
    </div>
</div>
{% endblock %}
