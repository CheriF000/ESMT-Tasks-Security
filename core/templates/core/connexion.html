{% extends 'core/base.html' %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="fas fa-sign-in-alt me-2"></i>Connexion</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
            <p class="text-center mt-3">Pas de compte ? <a href="{% url 'inscription' %}">S'inscrire</a></p>
        </div>
    </div>
</div>
{% endblock %}
