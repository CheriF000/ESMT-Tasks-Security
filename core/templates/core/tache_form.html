{% extends 'core/base.html' %}
{% block title %}{{ titre }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-1"><i class="fas fa-tasks me-2"></i>{{ titre }}</h3>
            <p class="text-muted mb-4">Projet : <strong>{{ projet.titre }}</strong></p>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                    <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
                <a href="{% url 'detail_projet' projet.pk %}" class="btn btn-outline-secondary w-100 mt-2">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
