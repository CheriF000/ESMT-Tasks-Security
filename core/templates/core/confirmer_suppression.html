{% extends 'core/base.html' %}
{% block title %}Confirmer la suppression{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
            <h4>Confirmer la suppression</h4>
            <p class="text-muted">Voulez-vous vraiment supprimer <strong>{{ objet }}</strong> ? Cette action est irréversible.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">Oui, supprimer</button>
                <a href="{% url 'liste_projets' %}" class="btn btn-outline-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
